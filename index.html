    --ink: #0E0E0C;

    --line: #1a1a18;
    --accent: #B64227;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--paper); color: var(--ink); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
  body { font-size: 15px; line-height: 1.5; }
  a { color: inherit; text-decoration: none; }
  .serif { font-family: 'Instrument Serif', serif; font-weight: 400; letter-spacing: -0.01em; }
  .mono { font-family: 'JetBrains Mono', monospace; font-weight: 400; }

  .container { max-width: 1440px; margin: 0 auto; padding: 0 40px; }
  .rule { height: 1px; background: var(--ink); opacity: 0.15; }

function Nav(){
  const [scrolled, setScrolled] = useState(false);
  useEffect(()=>{
    const h = ()=> setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', h); return ()=>window.removeEventListener('scroll', h);
  },[]);
  const items = [
    ["people","People"],["publications","Publications"],["contact","Contact"]
  ];
  return (
    <nav style={{
      position:'fixed', top:0, left:0, right:0, zIndex: 100,
      background: scrolled ? 'rgba(246,244,238,0.85)' : 'transparent',
      backdropFilter: scrolled ? 'blur(12px)' : 'none',
      borderBottom: scrolled ? '1px solid rgba(14,14,12,0.1)' : '1px solid transparent',
      transition:'all 0.3s ease'
    }}>
      <div className="container" style={{display:'flex', alignItems:'center', justifyContent:'space-between', height: 68}}>
        <a href="#top" style={{display:'flex', alignItems:'center', gap:12}}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <rect x="1" y="1" width="22" height="22" stroke="currentColor" strokeWidth="1.2"/>
            <path d="M6 12 L10 12 L10 8 L14 8 L14 16 L18 16 L18 12" stroke="var(--accent)" strokeWidth="1.5" fill="none"/>

}

    <section id="top" style={{paddingTop: 140, paddingBottom: 80, position:'relative'}}>
      <div className="container">

function People(){

  const [hover, setHover] = useState(null);
  const tabs = [
    ['director', 'Directors', PEOPLE.director.length],
    ['research', 'Researchers', PEOPLE.research.length],
    ['admin', 'Administrative', PEOPLE.admin.length],
    ['alumni', 'Alumni', PEOPLE.alumni.length],
  ];

  return (
    <section id="people" style={{padding:'120px 0', background:'var(--paper-2)'}}>
      <div className="container">
        <div style={{display:'grid', gridTemplateColumns:'2fr 3fr 2fr', gap:48, marginBottom:40}}>
          <div className="mono" style={{fontSize:11, color:'var(--muted)'}}>§ 02 — PEOPLE</div>
          <div className="uppercase" style={{color:'var(--muted)'}}>The team</div>
          <div></div>
        </div>

        <div style={{display:'flex', gap:4, marginBottom:40, borderBottom:'1px solid var(--ink)', marginTop:40}}>
          {tabs.map(([id, label, count])=>(
            <button key={id} onClick={()=>setTab(id)} style={{
              padding:'16px 20px 16px 0', marginRight: 28,
              borderBottom: tab===id ? '2px solid var(--accent)' : '2px solid transparent',
              marginBottom: -1, fontSize: 14, fontWeight: tab===id?500:400,
              opacity: tab===id ? 1 : 0.5
            }}>
              {label} <span className="mono" style={{fontSize:10, marginLeft:4, color:'var(--muted)'}}>({count.toString().padStart(2,'0')})</span>
            </button>
          ))}
        </div>

        {tab==='director' && (
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:24}}>
            {PEOPLE.director.map((p,i)=>(
              <div key={i} style={{padding:32, background:'var(--paper)', border:'1px solid rgba(14,14,12,0.1)'}}>
                <div className="serif" style={{fontSize:32, letterSpacing:'-0.01em', marginBottom:10}}>{p.name}</div>
                <div className="mono" style={{fontSize:11, color:'var(--accent)', marginBottom:14}}>{p.role.toUpperCase()}</div>
                <div style={{fontSize:14, lineHeight:1.5, color:'var(--muted)'}}>{p.affil}</div>
              </div>
            ))}
          </div>
        )}

        {tab==='research' && (
          <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:1, background:'rgba(14,14,12,0.15)', border:'1px solid rgba(14,14,12,0.15)'}}>
            {PEOPLE.research.map((p,i)=>(
              <div key={i}
                   onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(null)}
                   style={{background:'var(--paper)', padding:'24px 20px', position:'relative', minHeight:180, cursor:'default', transition:'background 0.2s', ...(hover===i?{background:'var(--ink)', color:'var(--paper)'}:{})}}>
                <div className="mono" style={{fontSize:10, opacity:0.5, marginBottom:28}}>
                  #{String(i+1).padStart(3,'0')}
                </div>
                <div className="serif" style={{fontSize:22, letterSpacing:'-0.01em', lineHeight:1.15, marginBottom:8}}>
                  {p.name}
                </div>
                <div style={{fontSize:11, opacity:0.65}}>{p.role}</div>
                {hover===i && (
                  <div style={{position:'absolute', bottom:16, right:16, fontSize:18}}>↗</div>
                )}
              </div>
            ))}
          </div>
        )}

        {tab==='admin' && (
          <div style={{display:'grid', gridTemplateColumns:'repeat(5, 1fr)', gap:1, background:'rgba(14,14,12,0.15)', border:'1px solid rgba(14,14,12,0.15)'}}>
            {PEOPLE.admin.map((p,i)=>(
              <div key={i} style={{background:'var(--paper)', padding:'24px 20px', minHeight:140}}>
                <div className="mono" style={{fontSize:10, color:'var(--muted)', marginBottom:20}}>#{String(i+1).padStart(3,'0')}</div>
                <div className="serif" style={{fontSize:20, letterSpacing:'-0.01em', marginBottom:6}}>{p.name}</div>
                <div style={{fontSize:11, color:'var(--muted)'}}>{p.role}</div>
              </div>
            ))}

        )}

        {tab==='alumni' && (
          <div>
            {PEOPLE.alumni.map((p,i)=>(
              <div key={i} style={{
                display:'grid', gridTemplateColumns:'80px 1fr 2fr auto', gap:24,
                padding:'22px 0', borderBottom:'1px solid rgba(14,14,12,0.15)',
                alignItems:'baseline'
              }}>
                <div className="mono" style={{fontSize:11, color:'var(--muted)'}}>#{String(i+1).padStart(3,'0')}</div>
                <div className="serif" style={{fontSize:26, letterSpacing:'-0.01em'}}>{p.name}</div>
                <div style={{fontSize:13, color:'var(--muted)'}}>{p.next}</div>

function Publications(){
  const [year, setYear] = useState('all');
  const [tag, setTag] = useState('all');
  const [q, setQ] = useState('');
  const [pubs, setPubs] = useState([]);
  const [meta, setMeta] = useState({ updated_at: null, source: null });
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    fetch('data/publications.json')
      .then(r => r.json())
      .then(data => {
        const MIN_YEAR = 2020; // CHILab established in 2020
        const items = (data.items || []).filter(p => Number(p.year) >= MIN_YEAR);
        setPubs(items);
        setMeta({ updated_at: data.updated_at, source: data.source });
        setLoading(false);
      })
      .catch(err => {
        console.error('Failed to load publications.json', err);
        setLoading(false);
      });
  }, []);

  const years = ['all', ...Array.from(new Set(pubs.map(p=>p.year))).sort((a,b)=>b-a)];
  const tags = ['all', ...Array.from(new Set(pubs.map(p=>p.tag).filter(Boolean)))];

  const filtered = useMemo(()=>{
    return pubs.filter(p=>{
      if(year!=='all' && p.year!==year) return false;
      if(tag!=='all' && p.tag!==tag) return false;
      if(q && !(p.title.toLowerCase().includes(q.toLowerCase()) || (p.authors||'').toLowerCase().includes(q.toLowerCase()))) return false;
      return true;
    });
  }, [pubs, year, tag, q]);

  const grouped = useMemo(()=>{
    const g = {};
    filtered.forEach(p=>{ (g[p.year] = g[p.year] || []).push(p); });
    return g;
  }, [filtered]);

  return (
    <section id="publications" style={{padding:'120px 0'}}>
      <div className="container">
        <div style={{display:'grid', gridTemplateColumns:'2fr 3fr 2fr', gap:48, marginBottom:40}}>
          <div className="mono" style={{fontSize:11, color:'var(--muted)'}}>§ 03 — PUBLICATIONS</div>
          <div className="uppercase" style={{color:'var(--muted)'}}>
            {meta.source === 'google_scholar' ? 'Auto-synced · Google Scholar' : 'Selected · since 2021'}
          </div>
          <div className="mono" style={{fontSize:10, color:'var(--muted)', textAlign:'right'}}>
            {meta.updated_at && <>LAST SYNC <span style={{color:'var(--accent)'}}>●</span> {meta.updated_at}</>}
          </div>
        </div>

        <div style={{display:'grid', gridTemplateColumns:'2fr 5fr', gap:48, marginBottom:60, alignItems:'end'}}>
          <div>
            <h2 className="serif" style={{fontSize:'clamp(40px, 5vw, 72px)', letterSpacing:'-0.02em', lineHeight:1, fontWeight:400}}>
              {loading ? '…' : pubs.length}<br/>
              <em style={{color:'var(--accent)'}}>papers.</em>
            </h2>
          </div>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:20}}>
            <div>
              <div className="mono" style={{fontSize:10, color:'var(--muted)', marginBottom:10}}>YEAR</div>
              <div style={{display:'flex', flexWrap:'wrap', gap:6}}>
                {years.map(y=>(
                  <button key={y} onClick={()=>setYear(y)} className="mono" style={{
                    fontSize:11, padding:'5px 10px',
                    border:'1px solid var(--ink)',
                    background: year===y ? 'var(--ink)':'transparent',
                    color: year===y ? 'var(--paper)':'var(--ink)'
                  }}>{y==='all'?'ALL':y}</button>
                ))}
              </div>
            </div>
            <div>
              <div className="mono" style={{fontSize:10, color:'var(--muted)', marginBottom:10}}>SEARCH</div>
              <input value={q} onChange={e=>setQ(e.target.value)} placeholder="title, author…"
                style={{width:'100%', border:'none', borderBottom:'1px solid var(--ink)', background:'transparent', padding:'6px 0', fontSize:13, outline:'none'}}/>
            </div>
          </div>
        </div>

        {loading && (
          <div style={{padding:'80px 0', textAlign:'center', color:'var(--muted)'}} className="mono">
            <span style={{fontSize:11}}>LOADING PUBLICATIONS…</span>
          </div>
        )}

        {!loading && Object.keys(grouped).length===0 && (
          <div style={{padding:'80px 0', textAlign:'center', color:'var(--muted)'}}>No matching publications.</div>
        )}

        {Object.keys(grouped).sort((a,b)=>b-a).map(y=>(
          <div key={y} style={{marginBottom:40}}>
            <div style={{display:'flex', alignItems:'baseline', gap:32, marginBottom:20, paddingBottom:16, borderBottom:'2px solid var(--ink)'}}>
              <span className="serif" style={{fontSize:72, letterSpacing:'-0.03em', lineHeight:0.9}}>{y}</span>
              <span className="mono" style={{fontSize:11, color:'var(--muted)'}}>
                {grouped[y].length.toString().padStart(2,'0')} papers
              </span>
            </div>
            {grouped[y].map((p, i)=>(
              <article key={i} style={{
                display:'grid', gridTemplateColumns:'60px 1fr 180px',
                gap:32, padding:'28px 0',
                borderBottom:'1px solid rgba(14,14,12,0.1)',
                alignItems:'start'
              }}>
                <div className="mono" style={{fontSize:11, color:'var(--muted)'}}>
                  {String(i+1).padStart(2,'0')}
                </div>
                <div>
                  <div className="serif" style={{fontSize:22, lineHeight:1.25, letterSpacing:'-0.01em', marginBottom:10, textWrap:'pretty'}}>
                    {p.link ? (
                      <a href={p.link} target="_blank" rel="noopener" style={{borderBottom:'1px solid transparent', transition:'border-color 0.2s'}}
                         onMouseEnter={e=>e.currentTarget.style.borderBottomColor='var(--ink)'}
                         onMouseLeave={e=>e.currentTarget.style.borderBottomColor='transparent'}>
                        {p.title}
                      </a>
                    ) : p.title}
                  </div>
                  <div style={{fontSize:13, color:'var(--muted)', marginBottom:10, lineHeight:1.5}}>{p.authors}</div>
                  <div style={{display:'flex', gap:12, alignItems:'center'}}>
                    <em style={{fontSize:13}} className="serif">{p.venue}</em>
                  </div>
                </div>
                <div style={{display:'flex', flexDirection:'column', gap:6, alignItems:'flex-end'}}>
                  <button className="mono" style={{fontSize:10, color:'var(--muted)'}} onClick={()=>{
                    navigator.clipboard?.writeText(`@article{${(p.authors||'ref').split(',')[0].split(' ').pop().toLowerCase()}${p.year},\n  title={${p.title}},\n  author={${p.authors||''}},\n  journal={${p.venue||''}},\n  year={${p.year}}\n}`);
                  }}>COPY BIBTEX ⎘</button>
                  {p.link ? (
                    <a href={p.link} target="_blank" rel="noopener" className="mono" style={{fontSize:10, color:'var(--accent)'}}>READ →</a>
                  ) : (
                    <span className="mono" style={{fontSize:10, color:'var(--muted)', opacity:0.4}}>READ →</span>
                  )}
                </div>
              </article>
            ))}
          </div>
        ))}
      </div>
    </section>
  );
}

          <div>
            <div className="mono" style={{fontSize:10, color:'rgba(246,244,238,0.5)', marginBottom:16}}>EMAIL</div>
            <div className="serif" style={{fontSize:22, lineHeight:1.35}}>
              taejoon@chilab.kr
            </div>
          </div>
        </div>

        <div style={{marginTop:120, paddingTop:32, borderTop:'1px solid rgba(246,244,238,0.2)', display:'flex', justifyContent:'space-between', alignItems:'baseline'}} className="mono">
          <span style={{fontSize:11, color:'rgba(246,244,238,0.5)'}}>ⓒ CHILab 2020–2026. All rights reserved.</span>
          <span style={{fontSize:11, color:'rgba(246,244,238,0.5)'}}>Computational Health Informatics Laboratory</span>
          <span style={{fontSize:11, color:'rgba(246,244,238,0.5)'}}>Back to top ↑</span>
        </div>
      </div>
    </section>
  );
}

function SectionCounter(){
  const [section, setSection] = useState('00');
  useEffect(()=>{
    const sections = ['top','people','publications','contact'];
    const h = ()=>{
      let cur = '00';
      sections.forEach((id, i)=>{
        const el = document.getElementById(id);
        if(el && el.getBoundingClientRect().top < 200) cur = String(i).padStart(2,'0');
      });
      setSection(cur);
    };
    h(); window.addEventListener('scroll', h); return ()=>window.removeEventListener('scroll', h);
  },[]);
  return (
    <div style={{position:'fixed', right:20, bottom:20, zIndex:50, pointerEvents:'none'}} className="mono">
      <div style={{
        padding:'8px 12px', background:'var(--ink)', color:'var(--paper)',
        fontSize:10, letterSpacing:'0.1em'
      }}>§ {section} / 03</div>
    </div>
  );
}

function App(){
  return (
    <>
      <Nav/>
      <Hero/>
      <People/>
      <Publications/>
      <Contact/>
      <SectionCounter/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
