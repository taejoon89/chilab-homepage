<style>

  ],
  admin: [

  ],

    { name:"Ha-na Cho", next:"UC Irvine, PhD Student" },
    { name:"Hansle Gwon", next:"INMED DATA Corp." },

/* ============ COMPONENTS ============ */

function Nav(){
  const [scrolled, setScrolled] = useState(false);
  useEffect(()=>{
    const h = ()=> setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', h); return ()=>window.removeEventListener('scroll', h);
  },[]);
  const items = [
    ["about","About"],["research","Research"],["people","People"],["publications","Publications"],["contact","Contact"]
  ];
  return (
    <nav style={{
      position:'fixed', top:0, left:0, right:0, zIndex: 100,
      background: scrolled ? 'rgba(246,244,238,0.85)' : 'transparent',
      backdropFilter: scrolled ? 'blur(12px)' : 'none',
      borderBottom: scrolled ? '1px solid rgba(14,14,12,0.1)' : '1px solid transparent',
      transition:'all 0.3s ease'
    }}>
      <div className="container" style={{display:'flex', alignItems:'center', justifyContent:'space-between', height: 68}}>
        <a href="#top" style={{display:'flex', alignItems:'center', gap:12}}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <rect x="1" y="1" width="22" height="22" stroke="currentColor" strokeWidth="1.2"/>
            <path d="M6 12 L10 12 L10 8 L14 8 L14 16 L18 16 L18 12" stroke="var(--accent)" strokeWidth="1.5" fill="none"/>
          </svg>
          <div style={{display:'flex', flexDirection:'column', lineHeight:1}}>
            <span className="serif" style={{fontSize:20, letterSpacing:'-0.02em'}}>CHILab</span>
            <span className="mono" style={{fontSize:9, color:'var(--muted)', marginTop:2}}>EST. 2020 · SEOUL</span>
          </div>
        </a>
        <div style={{display:'flex', gap:36, alignItems:'center'}}>
          {items.map(([id,label])=>(
            <a key={id} href={`#${id}`} className="uppercase" style={{opacity:0.75}}>{label}</a>
          ))}
          <a href="#contact" className="mono" style={{
            padding:'8px 14px', border:'1px solid var(--ink)', borderRadius:2, fontSize:11
          }}>Join the lab →</a>
        </div>
      </div>
    </nav>
  );
}

function Hero(){
  const [time, setTime] = useState('');
  useEffect(()=>{
    const tick = ()=>{
      const d = new Date();
      const opts = {timeZone:'Asia/Seoul', hour:'2-digit', minute:'2-digit', hour12:false};
      setTime(d.toLocaleTimeString('en-GB', opts) + ' KST');
    };
    tick(); const i=setInterval(tick, 1000); return ()=>clearInterval(i);
  },[]);
  return (
    <section id="top" style={{paddingTop: 140, paddingBottom: 80, position:'relative'}}>
      <div className="container">
        {/* top meta bar */}
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom: 80}} className="mono">
          <div style={{fontSize:11, color:'var(--muted)'}}>
            <span style={{display:'inline-block', width:6, height:6, borderRadius:'50%', background:'var(--accent)', marginRight:8, verticalAlign:'middle'}}></span>
            OPEN FOR COLLABORATION
          </div>
          <div style={{fontSize:11, color:'var(--muted)'}}>{time}</div>
          <div style={{fontSize:11, color:'var(--muted)'}}>N 37.5270° · E 127.1086°</div>
          <div style={{fontSize:11, color:'var(--muted)'}}>VOL. VI / 2026</div>
        </div>

        {/* big title */}
        <div style={{display:'grid', gridTemplateColumns:'1fr', gap: 0, position:'relative'}}>
          <div className="uppercase" style={{color:'var(--muted)', marginBottom:28}}>
            Computational Health Informatics Laboratory
          </div>
          <h1 className="serif" style={{
            fontSize:'clamp(64px, 11vw, 184px)', lineHeight:0.92, letterSpacing:'-0.035em',
            fontWeight:400
          }}>
            Advancing <span style={{fontStyle:'italic', color:'var(--accent)'}}>care</span><br/>
            through <span style={{fontStyle:'italic'}}>computation.</span>
          </h1>
        </div>

        <div style={{display:'grid', gridTemplateColumns:'2fr 3fr 2fr', gap:48, marginTop: 80, alignItems:'start'}}>
          <div className="mono" style={{fontSize:11, color:'var(--muted)'}}>
            § 01 — THE LAB
          </div>
          <p style={{fontSize:19, lineHeight:1.5, maxWidth: 520, color:'#2a2a26'}}>
            We are a research laboratory of passionate computer scientists and clinical researchers at
            <em> Asan Medical Center</em> and the <em>University of Ulsan College of Medicine</em>, building
            computational tools that measurably improve patient outcomes.
          </p>
          <div style={{display:'flex', flexDirection:'column', gap:16}}>
            <div style={{display:'flex', justifyContent:'space-between', fontSize:11}} className="mono">
              <span style={{color:'var(--muted)'}}>FOUNDED</span><span>2020</span>
            </div>
            <div className="rule-thin"/>
            <div style={{display:'flex', justifyContent:'space-between', fontSize:11}} className="mono">
              <span style={{color:'var(--muted)'}}>PUBLICATIONS</span><span>60+</span>
            </div>
            <div className="rule-thin"/>
            <div style={{display:'flex', justifyContent:'space-between', fontSize:11}} className="mono">
              <span style={{color:'var(--muted)'}}>RESEARCHERS</span><span>19</span>
            </div>
            <div className="rule-thin"/>
            <div style={{display:'flex', justifyContent:'space-between', fontSize:11}} className="mono">
              <span style={{color:'var(--muted)'}}>ALUMNI</span><span>09</span>
            </div>
          </div>
        </div>

        {/* ticker */}
        <div style={{marginTop:100, padding:'24px 0', borderTop:'1px solid rgba(14,14,12,0.2)', borderBottom:'1px solid rgba(14,14,12,0.2)', overflow:'hidden', whiteSpace:'nowrap'}}>
          <div style={{display:'inline-block', animation:'marquee 40s linear infinite'}} className="serif">
            {Array(3).fill(0).map((_,i)=>(
              <span key={i} style={{fontSize:28, letterSpacing:'-0.01em', marginRight:40}}>
                Cardiovascular AI <span style={{color:'var(--accent)'}}>✦</span> &nbsp;
                Clinical NLP <span style={{color:'var(--accent)'}}>✦</span> &nbsp;
                Multimodal Deep Learning <span style={{color:'var(--accent)'}}>✦</span> &nbsp;
                Risk Prediction <span style={{color:'var(--accent)'}}>✦</span> &nbsp;
                LLM Safety <span style={{color:'var(--accent)'}}>✦</span> &nbsp;
                Medical De-Identification <span style={{color:'var(--accent)'}}>✦</span> &nbsp;
              </span>
            ))}
          </div>
        </div>
      </div>
      <style>{`@keyframes marquee { from { transform:translateX(0); } to { transform: translateX(-33.33%); } }`}</style>
    </section>
  );
}

function About(){
  return (
    <section id="about" style={{padding:'120px 0', background:'var(--ink)', color:'var(--paper)'}}>
      <div className="container">
        <div style={{display:'grid', gridTemplateColumns:'2fr 3fr 2fr', gap:48, marginBottom:60}}>
          <div className="mono" style={{fontSize:11, color:'rgba(246,244,238,0.5)'}}>§ 02 — MANDATE</div>
          <div className="uppercase" style={{color:'rgba(246,244,238,0.6)'}}>What we do</div>
          <div></div>
        </div>

        <div style={{display:'grid', gridTemplateColumns:'2fr 5fr', gap:48}}>
          <div></div>
          <h2 className="serif" style={{fontSize:'clamp(36px, 5vw, 64px)', lineHeight:1.08, letterSpacing:'-0.02em', fontWeight:400}}>
            We develop <span style={{color:'var(--accent)'}}>deployable</span> machine learning systems for
            cardiovascular medicine, grounded in <em>real</em> electronic medical record data from one of Asia's
            largest tertiary hospitals — with privacy, safety and clinical validation as first-class constraints.
          </h2>
        </div>

        <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:32, marginTop:120, paddingTop:32, borderTop:'1px solid rgba(246,244,238,0.2)'}}>
          {[
            ["01","Clinical-grade","Every model is validated on real patient cohorts, not just benchmarks."],
            ["02","Multimodal","EMR, imaging, waveforms, and text — combined where it matters."],
            ["03","Privacy-first","De-identification and differential privacy are a precondition, not an afterthought."],
            ["04","Translational","Research that reaches the bedside via direct integration with hospital systems."],
          ].map(([n,t,d])=>(
            <div key={n}>
              <div className="mono" style={{fontSize:11, color:'var(--accent)', marginBottom:16}}>{n}</div>
              <div className="serif" style={{fontSize:26, marginBottom:12, letterSpacing:'-0.01em'}}>{t}</div>
              <p style={{fontSize:13, lineHeight:1.55, color:'rgba(246,244,238,0.7)'}}>{d}</p>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function Research(){
  const [active, setActive] = useState("01");
  const area = RESEARCH_AREAS.find(a=>a.id===active);
  return (
    <section id="research" style={{padding:'120px 0'}}>
      <div className="container">
        <div style={{display:'grid', gridTemplateColumns:'2fr 3fr 2fr', gap:48, marginBottom:60}}>
          <div className="mono" style={{fontSize:11, color:'var(--muted)'}}>§ 03 — RESEARCH AREAS</div>
          <div className="uppercase" style={{color:'var(--muted)'}}>Four Pillars</div>
          <div></div>
        </div>

        <div style={{display:'grid', gridTemplateColumns:'2fr 3fr', gap:80, alignItems:'start'}}>
          {/* list */}
          <div>
            {RESEARCH_AREAS.map((r, i)=>(
              <button
                key={r.id}
                onClick={()=>setActive(r.id)}
                style={{
                  display:'block', width:'100%', textAlign:'left',
                  padding:'28px 0',
                  borderTop: i===0 ? '1px solid var(--ink)' : 'none',
                  borderBottom:'1px solid rgba(14,14,12,0.2)',
                  opacity: active===r.id ? 1 : 0.45,
                  transition:'opacity 0.25s',
                  cursor:'pointer'
                }}
                onMouseEnter={e=>e.currentTarget.style.opacity=1}
                onMouseLeave={e=>{if(active!==r.id) e.currentTarget.style.opacity=0.45}}
              >
                <div style={{display:'flex', alignItems:'baseline', gap:20}}>
                  <span className="mono" style={{fontSize:11, color:'var(--accent)', minWidth:24}}>{r.id}</span>
                  <span className="serif" style={{fontSize:40, letterSpacing:'-0.015em', lineHeight:1.1, flex:1}}>{r.title}</span>
                  <span style={{fontSize:18, opacity: active===r.id?1:0.3, transition:'all 0.3s', transform: active===r.id?'translateX(4px)':'none'}}>→</span>
                </div>
              </button>
            ))}
          </div>

          {/* detail */}
          <div style={{position:'sticky', top:120}}>
            {/* visual panel */}
            <div style={{
              aspectRatio:'4/5', background:'var(--paper-2)', position:'relative', overflow:'hidden',
              border:'1px solid rgba(14,14,12,0.15)'
            }}>
              <ResearchVisual area={area} />
              <div style={{position:'absolute', top:20, left:20, right:20, display:'flex', justifyContent:'space-between'}} className="mono">
                <span style={{fontSize:10, color:'var(--muted)'}}>FIG. {area.id}</span>
                <span style={{fontSize:10, color:'var(--muted)'}}>{area.tag || 'ILLUSTRATION'}</span>
              </div>
              <div style={{position:'absolute', bottom:24, left:24, right:24}}>
                <div className="mono" style={{fontSize:10, color:'var(--muted)', marginBottom:8}}>EXCERPT</div>
                <p style={{fontSize:15, lineHeight:1.5, color:'var(--ink)'}}>{area.desc}</p>
                <div style={{display:'flex', flexWrap:'wrap', gap:6, marginTop:16}}>
                  {area.keywords.map(k=>(
                    <span key={k} className="mono" style={{
                      fontSize:10, padding:'4px 10px', border:'1px solid var(--ink)', borderRadius:100
                    }}>{k}</span>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

function ResearchVisual({ area }) {
  // abstract SVG per area
  if(area.id==="01") return (
    <svg viewBox="0 0 400 500" style={{position:'absolute', inset:0, width:'100%', height:'100%'}}>
      {Array(12).fill(0).map((_,i)=>(
        <rect key={i} x={40+i*26} y={180 + Math.sin(i)*60} width="14" height={120 - Math.sin(i*1.3)*40} fill="none" stroke="var(--ink)" strokeWidth="0.8"/>
      ))}
      <circle cx="200" cy="230" r="90" fill="none" stroke="var(--accent)" strokeWidth="1"/>
      <circle cx="200" cy="230" r="60" fill="none" stroke="var(--accent)" strokeWidth="1"/>
    </svg>
  );
  if(area.id==="02") return (
    <svg viewBox="0 0 400 500" style={{position:'absolute', inset:0, width:'100%', height:'100%'}}>
      <path d="M 20 300 Q 100 200, 180 260 T 380 220" stroke="var(--ink)" fill="none" strokeWidth="1"/>
      <path d="M 20 330 Q 100 280, 180 310 T 380 270" stroke="var(--accent)" fill="none" strokeWidth="1.5"/>
      {Array(20).fill(0).map((_,i)=>(
        <circle key={i} cx={20+i*18} cy={200 + Math.cos(i*0.7)*80} r="2" fill="var(--ink)"/>
      ))}
    </svg>
  );
  if(area.id==="03") return (
    <svg viewBox="0 0 400 500" style={{position:'absolute', inset:0, width:'100%', height:'100%'}}>
      {Array(8).fill(0).map((_,i)=>(
        <g key={i}>
          <circle cx={80+i*35} cy="180" r="4" fill="var(--ink)"/>
          <circle cx={80+i*35} cy="280" r="4" fill={i%2?'var(--accent)':'var(--ink)'}/>
          <line x1={80+i*35} y1="184" x2={80+i*35} y2="276" stroke="var(--ink)" strokeWidth="0.5" opacity="0.3"/>
        </g>
      ))}
      {Array(8).fill(0).map((_,i)=>Array(8).fill(0).map((_,j)=>(
        <line key={`${i}-${j}`} x1={80+i*35} y1="180" x2={80+j*35} y2="280" stroke="var(--ink)" strokeWidth="0.3" opacity="0.15"/>
      )))}
    </svg>
  );
  return (
    <svg viewBox="0 0 400 500" style={{position:'absolute', inset:0, width:'100%', height:'100%'}}>
      <rect x="80" y="160" width="240" height="160" fill="none" stroke="var(--ink)" strokeWidth="1"/>
      <rect x="100" y="180" width="200" height="120" fill="none" stroke="var(--accent)" strokeWidth="1" strokeDasharray="4 4"/>
      <text x="200" y="245" textAnchor="middle" fontFamily="JetBrains Mono" fontSize="14" fill="var(--ink)">ENCRYPTED</text>
      <text x="200" y="265" textAnchor="middle" fontFamily="JetBrains Mono" fontSize="10" fill="var(--muted)">0xE4F2...A1C7</text>
    </svg>
  );
}

function People(){
  const [tab, setTab] = useState('research');
  const [hover, setHover] = useState(null);
  const tabs = [
    ['director', 'Directors', PEOPLE.director.length],
    ['research', 'Researchers', PEOPLE.research.length],
    ['admin', 'Administrative', PEOPLE.admin.length],
    ['alumni', 'Alumni', PEOPLE.alumni.length],
  ];

  return (
    <section id="people" style={{padding:'120px 0', background:'var(--paper-2)'}}>
      <div className="container">
        <div style={{display:'grid', gridTemplateColumns:'2fr 3fr 2fr', gap:48, marginBottom:40}}>
          <div className="mono" style={{fontSize:11, color:'var(--muted)'}}>§ 04 — PEOPLE</div>
          <div className="uppercase" style={{color:'var(--muted)'}}>The team</div>
          <div></div>
        </div>

        <h2 className="serif" style={{fontSize:'clamp(40px, 6vw, 88px)', letterSpacing:'-0.025em', lineHeight:1, marginBottom:60, fontWeight:400}}>
          Twenty-eight<br/>
          <em style={{color:'var(--accent)'}}>researchers & clinicians.</em>
        </h2>

        <div style={{display:'flex', gap:4, marginBottom:40, borderBottom:'1px solid var(--ink)'}}>
          {tabs.map(([id, label, count])=>(
            <button key={id} onClick={()=>setTab(id)} style={{
              padding:'16px 20px 16px 0', marginRight: 28,
              borderBottom: tab===id ? '2px solid var(--accent)' : '2px solid transparent',
              marginBottom: -1, fontSize: 14, fontWeight: tab===id?500:400,
              opacity: tab===id ? 1 : 0.5
            }}>
              {label} <span className="mono" style={{fontSize:10, marginLeft:4, color:'var(--muted)'}}>({count.toString().padStart(2,'0')})</span>
            </button>
          ))}
        </div>

        {tab==='director' && (
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:24}}>
            {PEOPLE.director.map((p,i)=>(
              <div key={i} style={{padding:32, background:'var(--paper)', border:'1px solid rgba(14,14,12,0.1)', display:'grid', gridTemplateColumns:'auto 1fr', gap:24}}>
                <div style={{width:100, height:130, background:'var(--ink)', color:'var(--paper)', display:'flex', alignItems:'center', justifyContent:'center'}} className="serif">
                  <span style={{fontSize:44, letterSpacing:'-0.04em'}}>{p.initials}</span>
                </div>
                <div>
                  <div className="serif" style={{fontSize:28, letterSpacing:'-0.01em', marginBottom:6}}>{p.name}</div>
                  <div className="mono" style={{fontSize:11, color:'var(--accent)', marginBottom:10}}>{p.role.toUpperCase()}</div>
                  <div style={{fontSize:13, lineHeight:1.5, color:'var(--muted)'}}>{p.affil}</div>
                </div>
              </div>
            ))}
          </div>
        )}

        {tab==='research' && (
          <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:1, background:'rgba(14,14,12,0.15)', border:'1px solid rgba(14,14,12,0.15)'}}>
            {PEOPLE.research.map((p,i)=>(
              <div key={i}
                   onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(null)}
                   style={{background:'var(--paper)', padding:'24px 20px', position:'relative', minHeight:180, cursor:'default', transition:'background 0.2s', ...(hover===i?{background:'var(--ink)', color:'var(--paper)'}:{})}}>
                <div className="mono" style={{fontSize:10, opacity:0.5, marginBottom:28}}>
                  #{String(i+1).padStart(3,'0')}
                </div>
                <div className="serif" style={{fontSize:22, letterSpacing:'-0.01em', lineHeight:1.15, marginBottom:8}}>
                  {p.name}
                </div>
                <div style={{fontSize:11, opacity:0.65}}>{p.role}</div>
                {hover===i && (
                  <div style={{position:'absolute', bottom:16, right:16, fontSize:18}}>↗</div>
                )}
              </div>
            ))}
          </div>
        )}

        {tab==='admin' && (
          <div style={{display:'grid', gridTemplateColumns:'repeat(5, 1fr)', gap:1, background:'rgba(14,14,12,0.15)', border:'1px solid rgba(14,14,12,0.15)'}}>
            {PEOPLE.admin.map((p,i)=>(
              <div key={i} style={{background:'var(--paper)', padding:'24px 20px', minHeight:140}}>
                <div className="mono" style={{fontSize:10, color:'var(--muted)', marginBottom:20}}>#{String(i+1).padStart(3,'0')}</div>
                <div className="serif" style={{fontSize:20, letterSpacing:'-0.01em', marginBottom:6}}>{p.name}</div>
                <div style={{fontSize:11, color:'var(--muted)'}}>{p.role}</div>
              </div>
            ))}
          </div>
        )}

        {tab==='alumni' && (
          <div>
            {PEOPLE.alumni.map((p,i)=>(
              <div key={i} style={{
                display:'grid', gridTemplateColumns:'80px 1fr 2fr auto', gap:24,
                padding:'22px 0', borderBottom:'1px solid rgba(14,14,12,0.15)',
                alignItems:'baseline'
              }}>
                <div className="mono" style={{fontSize:11, color:'var(--muted)'}}>#{String(i+1).padStart(3,'0')}</div>
                <div className="serif" style={{fontSize:26, letterSpacing:'-0.01em'}}>{p.name}</div>
                <div style={{fontSize:13, color:'var(--muted)'}}>{p.next}</div>

}

function Publications(){
  const [year, setYear] = useState('all');
  const [tag, setTag] = useState('all');
  const [q, setQ] = useState('');
  const [pubs, setPubs] = useState([]);
  const [meta, setMeta] = useState({ updated_at: null, source: null });
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    fetch('data/publications.json')
      .then(r => r.json())
      .then(data => {
        setPubs(data.items || []);
        setMeta({ updated_at: data.updated_at, source: data.source });
        setLoading(false);
      })
      .catch(err => {
        console.error('Failed to load publications.json', err);
        setLoading(false);
      });
  }, []);

  const years = ['all', ...Array.from(new Set(pubs.map(p=>p.year))).sort((a,b)=>b-a)];
  const tags = ['all', ...Array.from(new Set(pubs.map(p=>p.tag).filter(Boolean)))];

  const filtered = useMemo(()=>{
    return pubs.filter(p=>{
      if(year!=='all' && p.year!==year) return false;
      if(tag!=='all' && p.tag!==tag) return false;
      if(q && !(p.title.toLowerCase().includes(q.toLowerCase()) || (p.authors||'').toLowerCase().includes(q.toLowerCase()))) return false;
      return true;
    });
  }, [pubs, year, tag, q]);

  const grouped = useMemo(()=>{
    const g = {};
    filtered.forEach(p=>{ (g[p.year] = g[p.year] || []).push(p); });
    return g;
  }, [filtered]);

  return (
    <section id="publications" style={{padding:'120px 0'}}>
      <div className="container">
        <div style={{display:'grid', gridTemplateColumns:'2fr 3fr 2fr', gap:48, marginBottom:40}}>
          <div className="mono" style={{fontSize:11, color:'var(--muted)'}}>§ 05 — PUBLICATIONS</div>
          <div className="uppercase" style={{color:'var(--muted)'}}>
            {meta.source === 'google_scholar' ? 'Auto-synced · Google Scholar' : 'Selected · since 2021'}
          </div>
          <div className="mono" style={{fontSize:10, color:'var(--muted)', textAlign:'right'}}>
            {meta.updated_at && <>LAST SYNC <span style={{color:'var(--accent)'}}>●</span> {meta.updated_at}</>}
          </div>
        </div>

        <div style={{display:'grid', gridTemplateColumns:'2fr 5fr', gap:48, marginBottom:60, alignItems:'end'}}>
          <div>
            <h2 className="serif" style={{fontSize:'clamp(40px, 5vw, 72px)', letterSpacing:'-0.02em', lineHeight:1, fontWeight:400}}>
              {loading ? '…' : pubs.length}<br/>
              <em style={{color:'var(--accent)'}}>papers.</em>
            </h2>
          </div>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:20}}>
            <div>
              <div className="mono" style={{fontSize:10, color:'var(--muted)', marginBottom:10}}>YEAR</div>
              <div style={{display:'flex', flexWrap:'wrap', gap:6}}>
                {years.map(y=>(
                  <button key={y} onClick={()=>setYear(y)} className="mono" style={{
                    fontSize:11, padding:'5px 10px',
                    border:'1px solid var(--ink)',
                    background: year===y ? 'var(--ink)':'transparent',
                    color: year===y ? 'var(--paper)':'var(--ink)'
                  }}>{y==='all'?'ALL':y}</button>
                ))}
              </div>
            </div>
            <div>
              <div className="mono" style={{fontSize:10, color:'var(--muted)', marginBottom:10}}>TOPIC</div>
              <div style={{display:'flex', flexWrap:'wrap', gap:6}}>
                {tags.map(t=>(
                  <button key={t} onClick={()=>setTag(t)} className="mono" style={{
                    fontSize:11, padding:'5px 10px',
                    border:'1px solid var(--ink)',
                    background: tag===t ? 'var(--ink)':'transparent',
                    color: tag===t ? 'var(--paper)':'var(--ink)'
                  }}>{t==='all'?'ALL':t.toUpperCase()}</button>
                ))}
              </div>
            </div>
            <div>
              <div className="mono" style={{fontSize:10, color:'var(--muted)', marginBottom:10}}>SEARCH</div>
              <input value={q} onChange={e=>setQ(e.target.value)} placeholder="title, author…"
                style={{width:'100%', border:'none', borderBottom:'1px solid var(--ink)', background:'transparent', padding:'6px 0', fontSize:13, outline:'none'}}/>
            </div>
          </div>
        </div>

        {loading && (
          <div style={{padding:'80px 0', textAlign:'center', color:'var(--muted)'}} className="mono">
            <span style={{fontSize:11}}>LOADING PUBLICATIONS…</span>
          </div>
        )}

        {!loading && Object.keys(grouped).length===0 && (
          <div style={{padding:'80px 0', textAlign:'center', color:'var(--muted)'}}>No matching publications.</div>
        )}

        {Object.keys(grouped).sort((a,b)=>b-a).map(y=>(
          <div key={y} style={{marginBottom:40}}>
            <div style={{display:'flex', alignItems:'baseline', gap:32, marginBottom:20, paddingBottom:16, borderBottom:'2px solid var(--ink)'}}>
              <span className="serif" style={{fontSize:72, letterSpacing:'-0.03em', lineHeight:0.9}}>{y}</span>
              <span className="mono" style={{fontSize:11, color:'var(--muted)'}}>
                {grouped[y].length.toString().padStart(2,'0')} papers
              </span>
            </div>
            {grouped[y].map((p, i)=>(
              <article key={i} style={{
                display:'grid', gridTemplateColumns:'60px 1fr 180px',
                gap:32, padding:'28px 0',
                borderBottom:'1px solid rgba(14,14,12,0.1)',
                alignItems:'start'
              }}>
                <div className="mono" style={{fontSize:11, color:'var(--muted)'}}>
                  {String(i+1).padStart(2,'0')}
                </div>
                <div>
                  <div className="serif" style={{fontSize:22, lineHeight:1.25, letterSpacing:'-0.01em', marginBottom:10, textWrap:'pretty'}}>
                    {p.link ? (
                      <a href={p.link} target="_blank" rel="noopener" style={{borderBottom:'1px solid transparent', transition:'border-color 0.2s'}}
                         onMouseEnter={e=>e.currentTarget.style.borderBottomColor='var(--ink)'}
                         onMouseLeave={e=>e.currentTarget.style.borderBottomColor='transparent'}>
                        {p.title}
                      </a>
                    ) : p.title}
                  </div>
                  <div style={{fontSize:13, color:'var(--muted)', marginBottom:10, lineHeight:1.5}}>{p.authors}</div>
                  <div style={{display:'flex', gap:12, alignItems:'center'}}>
                    <em style={{fontSize:13}} className="serif">{p.venue}</em>
                    {p.tag && <span className="mono" style={{fontSize:10, padding:'3px 8px', border:'1px solid rgba(14,14,12,0.3)', borderRadius:100}}>{p.tag.toUpperCase()}</span>}
                  </div>
                </div>
                <div style={{display:'flex', flexDirection:'column', gap:6, alignItems:'flex-end'}}>
                  <button className="mono" style={{fontSize:10, color:'var(--muted)'}} onClick={()=>{
                    navigator.clipboard?.writeText(`@article{${(p.authors||'ref').split(',')[0].split(' ').pop().toLowerCase()}${p.year},\n  title={${p.title}},\n  author={${p.authors||''}},\n  journal={${p.venue||''}},\n  year={${p.year}}\n}`);
                  }}>COPY BIBTEX ⎘</button>
                  {p.link ? (
                    <a href={p.link} target="_blank" rel="noopener" className="mono" style={{fontSize:10, color:'var(--accent)'}}>READ →</a>
                  ) : (
                    <span className="mono" style={{fontSize:10, color:'var(--muted)', opacity:0.4}}>READ →</span>
                  )}
                </div>
              </article>
            ))}
          </div>
        ))}
      </div>
    </section>
  );
}

      <div className="container">
        <div style={{display:'grid', gridTemplateColumns:'2fr 3fr 2fr', gap:48, marginBottom:40}}>

              <div key={i} style={{display:'flex', justifyContent:'space-between', padding:'12px 0', borderBottom:'1px solid rgba(246,244,238,0.15)', fontSize:13}}>

          <span style={{fontSize:11, color:'rgba(246,244,238,0.5)'}}>Computational Health Informatics Laboratory</span>

function SectionCounter(){
  const [section, setSection] = useState('00');
  useEffect(()=>{
    const sections = ['top','about','research','people','publications','contact'];
    const h = ()=>{
      let cur = '00';
      sections.forEach((id, i)=>{
        const el = document.getElementById(id);
        if(el && el.getBoundingClientRect().top < 200) cur = String(i).padStart(2,'0');
      });
      setSection(cur);
    };
    h(); window.addEventListener('scroll', h); return ()=>window.removeEventListener('scroll', h);
  },[]);
  return (
    <div style={{position:'fixed', right:20, bottom:20, zIndex:50, pointerEvents:'none'}} className="mono">
      <div style={{
        padding:'8px 12px', background:'var(--ink)', color:'var(--paper)',
        fontSize:10, letterSpacing:'0.1em'
      }}>§ {section} / 05</div>
    </div>
  );
}

function App(){
  return (
    <>
      <Nav/>
      <Hero/>
      <About/>
      <Research/>
      <People/>
      <Publications/>
      <Contact/>
      <SectionCounter/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
