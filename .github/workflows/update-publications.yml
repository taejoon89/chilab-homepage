name: Update publications from Google Scholar

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch Scholar
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SCHOLAR_USER_ID: ${{ vars.SCHOLAR_USER_ID || '-a2slUgAAAAJ' }}
        run: node scripts/fetch-scholar.mjs

      - name: Commit if changed
        run: |
          git config user.name  "chilab-bot"
          git config user.email "bot@chilab.kr"
          git add data/publications.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore(data): sync publications from Google Scholar"
            git push
          fi
